<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Math-Tree">
  <!-- 藍地に琥珀のノードが連なる小さなツリー + √(ルート) モチーフ（design-system §7） -->
  <rect width="32" height="32" rx="7" fill="#0f1729"/>
  <!-- √ ルート記号 + 樹の幹/枝（藍） -->
  <path d="M5 18 l3 4.5 L13 9 h4 v-0.3"
        fill="none" stroke="#3b5bdb" stroke-width="2.1"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 枝（樹が育つ：上のバーから分岐） -->
  <path d="M17 8.7 l5 -3.2 M17 8.7 l4.5 4" fill="none"
        stroke="#3b5bdb" stroke-width="1.8" stroke-linecap="round"/>
  <!-- 琥珀ノード（アンロック/到達） -->
  <circle cx="13" cy="9" r="2.2" fill="#f59e0b"/>
  <circle cx="22.4" cy="5.2" r="2.1" fill="#fbbf24"/>
  <circle cx="22" cy="12.8" r="2.1" fill="#f59e0b"/>
  <circle cx="8" cy="22.5" r="1.7" fill="#fbbf24"/>
</svg>
