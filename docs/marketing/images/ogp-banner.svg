<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Math-Tree">
  <!-- 抽象 OGP バナー: 藍地に琥珀のノードが枝分かれする知識グラフ（テックツリー）。文字なし・人物なし -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1426"/>
      <stop offset="0.55" stop-color="#0f1729"/>
      <stop offset="1" stop-color="#16203c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 枝（藍のエッジ = 依存グラフ）。下の根から上へ枝分かれして広がる -->
  <g fill="none" stroke="#3b5bdb" stroke-linecap="round" stroke-opacity="0.85">
    <path d="M250 540 L250 430" stroke-width="6"/>
    <path d="M250 430 L420 350" stroke-width="5"/>
    <path d="M250 430 L300 300" stroke-width="5"/>
    <path d="M420 350 L600 280" stroke-width="5"/>
    <path d="M420 350 L520 200" stroke-width="4"/>
    <path d="M300 300 L360 170" stroke-width="4"/>
    <path d="M600 280 L800 230" stroke-width="4.5"/>
    <path d="M600 280 L720 150" stroke-width="4"/>
    <path d="M800 230 L960 300" stroke-width="4"/>
    <path d="M800 230 L920 130" stroke-width="3.5"/>
  </g>

  <!-- ノード: 習得済み=琥珀充塗 / 次に学べる=藍輪郭 / 遠いゴール=琥珀点線（低不透明・遠景） -->
  <g>
    <circle cx="250" cy="540" r="20" fill="#f59e0b"/>
    <circle cx="250" cy="430" r="18" fill="#f59e0b"/>
    <circle cx="420" cy="350" r="17" fill="#fbbf24"/>
    <circle cx="300" cy="300" r="15" fill="#f59e0b"/>
    <circle cx="600" cy="280" r="16" fill="#fbbf24"/>
    <!-- 解放済み（次に学べる）: 藍輪郭 + 淡い内側グロー -->
    <circle cx="520" cy="200" r="14" fill="#16203c" stroke="#3b5bdb" stroke-width="4"/>
    <circle cx="360" cy="170" r="13" fill="#16203c" stroke="#3b5bdb" stroke-width="4"/>
    <circle cx="800" cy="230" r="15" fill="#16203c" stroke="#3b5bdb" stroke-width="4"/>
    <!-- 遠いゴール（ロマンノード）: 琥珀点線・低不透明・小さめ -->
    <circle cx="720" cy="150" r="12" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="5 6" opacity="0.55"/>
    <circle cx="960" cy="300" r="12" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="5 6" opacity="0.5"/>
    <circle cx="920" cy="130" r="11" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="5 6" opacity="0.45"/>
  </g>

  <!-- 右上に √(ルート記号) を象徴的に薄く配置（数学 + 根=基礎から） -->
  <path d="M1010 250 l22 34 L1078 150 h70" fill="none" stroke="#3b5bdb" stroke-width="7"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>

  <ellipse cx="250" cy="500" rx="320" ry="220" fill="url(#glow)"/>
</svg>
